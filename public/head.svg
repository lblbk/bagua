<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <mask id="coinMask">
      <circle cx="250" cy="250" r="230" fill="white"/>
      <rect x="185" y="185" width="130" height="130" fill="black"/>
    </mask>
    <clipPath id="faceClip">
      <path fill-rule="evenodd"
        d="M 250,56 A 194,194 0 1 1 249.999,56 Z
           M 185,185 H 315 V 315 H 185 Z"/>
    </clipPath>
  </defs>

  <!-- Coin face -->
  <circle cx="250" cy="250" r="230" fill="#7A5800" mask="url(#coinMask)"/>

  <!-- Outer rim ring -->
  <circle cx="250" cy="250" r="230" fill="none" stroke="#B8860B" stroke-width="72" mask="url(#coinMask)"/>

  <!-- Square hole stroke border -->
  <rect x="185" y="185" width="130" height="130" fill="none" stroke="#B8860B" stroke-width="10"/>

  <g clip-path="url(#faceClip)">
    <!-- 永 top -->
    <text x="250" y="136"
      font-family="'Noto Serif SC','SimSun','STSong','serif'"
      font-size="115" font-weight="900"
      text-anchor="middle" dominant-baseline="middle"
      fill="#B8860B">永</text>

    <!-- 通 right -->
    <text x="379" y="250"
      font-family="'Noto Serif SC','SimSun','STSong','serif'"
      font-size="115" font-weight="900"
      text-anchor="middle" dominant-baseline="middle"
      fill="#B8860B">通</text>

    <!-- 樂 bottom -->
    <text x="250" y="394"
      font-family="'Noto Serif SC','SimSun','STSong','serif'"
      font-size="115" font-weight="900"
      text-anchor="middle" dominant-baseline="middle"
      fill="#B8860B">樂</text>

    <!-- 寶 left -->
    <text x="121" y="250"
      font-family="'Noto Serif SC','SimSun','STSong','serif'"
      font-size="115" font-weight="900"
      text-anchor="middle" dominant-baseline="middle"
      fill="#B8860B">寶</text>
  </g>

</svg>
